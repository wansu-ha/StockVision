version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stockvision_postgres
    environment:
      POSTGRES_DB: stockvision
      POSTGRES_USER: stockvision_user
      POSTGRES_PASSWORD: stockvision_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockvision_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  cloud_server:
    build:
      context: .
      dockerfile: cloud_server/Dockerfile
    container_name: stockvision_cloud
    ports:
      - "4010:4010"
    environment:
      - DATABASE_URL=postgresql://stockvision_user:stockvision_pass@postgres:5432/stockvision
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
